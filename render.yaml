services:
  - type: web
    name: fieldops-web
    runtime: static
    staticPublishPath: ./frontend
  - type: web
    name: fieldops-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: FIELDOPS_ENV
        value: production
      - key: FIELDOPS_HOST
        value: 0.0.0.0
      - key: FIELDOPS_PUBLIC_APP_URL
        value: https://usfieldops.com
      - key: FIELDOPS_API_BASE_URL
        value: https://api.usfieldops.com/api
      - key: FIELDOPS_ALLOWED_ORIGINS
        value: https://usfieldops.com,https://www.usfieldops.com,https://fieldops-web.onrender.com
      - key: FIELDOPS_SERVE_FRONTEND
        value: "false"
      - key: FIELDOPS_RELOAD
        value: "false"
      - key: FIELDOPS_NOTION_DAILY_LOG_DB_ID
        value: dc9bbfed-8219-4cb6-add4-89d1d6b89284
      - key: FIELDOPS_NOTION_MISSION_LEDGER_DB_ID
        value: 777768e7-1d47-4dd7-8411-f575dbd551b5
      - key: FIELDOPS_DATA_DIR
        value: /data
      - key: FIELDOPS_CREDENTIALS_PATH
        value: /etc/secrets/credentials.json
      - key: FIELDOPS_GMAIL_TOKEN_PATH
        value: /etc/secrets/token.json
      - key: FIELDOPS_CALENDAR_TOKEN_PATH
        value: /etc/secrets/calendar_token.json
    disk:
      name: fieldops-data
      mountPath: /data
      sizeGB: 1
